<form [formGroup]="form" (ngSubmit)="onSubmit()" class="row g-3 px-3 py-2">
  <h2>AÑADIR INSTITUCIÓN</h2>
  <div class="col-md-6">
    <label class="form-label">Nombre de la Institución</label>
    <input type="text" formControlName="nombreInstitucion" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Persona de Contacto</label>
    <input type="text" formControlName="personaContacto" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Cargo</label>
    <input type="text" formControlName="cargo" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Dirección</label>
    <input type="text" formControlName="direccion" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Teléfono</label>
    <input type="text" formControlName="telefono" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Email</label>
    <input type="email" formControlName="email" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Web</label>
    <input type="text" formControlName="web" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Fecha de Incorporación</label>
    <input type="date" formControlName="fechaIncorporacion" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Fecha de Baja</label>
    <input type="date" formControlName="fechaBaja" class="form-control" />
  </div>

  <div class="col-md-4 d-flex align-items-center">
    <div class="form-check mt-4">
      <input class="form-check-input" type="checkbox" formControlName="activa" id="activaCheck" />
      <label class="form-check-label" for="activaCheck">
        Activa
      </label>
    </div>
  </div>

  <div class="col-12">
    <label class="form-label">Observaciones</label>
    <textarea formControlName="observaciones" class="form-control" rows="2"></textarea>
  </div>

  <div class="col-md-6">
    <label class="form-label">Tipo de Institución</label>
    <select formControlName="tipoInstitucionId" class="form-select">
      <option [ngValue]="null">Seleccione un tipo</option>
      <option *ngFor="let tipo of tiposInstitucion" [value]="tipo.id">
        {{ tipo.nombre }}
      </option>
    </select>
  </div>

  <div class="col-12 d-flex justify-content-end">
    <button type="submit" class="btn btn-primary me-2" [disabled]="form.invalid">Guardar</button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
  </div>
</form>
