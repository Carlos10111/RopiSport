<div class="card shadow-sm mb-5">
  <div class="card-header bg-primary text-white">
    {{ nuevaSocia.id ? 'Editar Socia' : 'Alta de Socia' }}
  </div>

  <div class="card-body">
    <form (ngSubmit)="onSubmit(sociaForm)" #sociaForm="ngForm">

      <!-- Datos Personales -->
      <div class="card mb-4">
        <div class="card-header fw-bold">Datos Personales</div>
        <div class="card-body row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.nombre" name="nombre" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellidos</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.apellidos" name="apellidos" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="nuevaSocia.email" name="email" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono Personal</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.telefonoPersonal" name="telefonoPersonal" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono Negocio</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.telefonoNegocio" name="telefonoNegocio" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Estado</label>
            <select class="form-select" [(ngModel)]="nuevaSocia.activa" name="activa">
              <option [ngValue]="true">Activa</option>
              <option [ngValue]="false">Inactiva</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Información del Negocio -->
      <div class="card mb-4">
        <div class="card-header fw-bold">Información del Negocio</div>
        <div class="card-body row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre Negocio</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.nombreNegocio" name="nombreNegocio" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Descripción Negocio</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.descripcionNegocio" name="descripcionNegocio" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Categoría</label>
            <!-- Aquí puedes cambiar por un select si tienes lista de categorías -->
            <option *ngFor="let cat of categorias" [ngValue]="cat">{{ cat.nombre }}</option>          </div>
          <div class="col-md-6">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.direccion" name="direccion" />
          </div>
          <div class="col-md-6">
            <label class="form-label">CIF</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.cif" name="cif" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Número de Cuenta</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.numeroCuenta" name="numeroCuenta" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Epígrafe</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaSocia.epigrafe" name="epigrafe" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Logo</label>
            <input type="file" class="form-control" (change)="onLogoChange($event)" name="logo" />
          </div>
        </div>
      </div>

      <!-- Fechas -->
      <div class="card mb-4">
        <div class="card-header fw-bold">Fechas</div>
        <div class="card-body row g-3">
          <div class="col-md-6">
            <label class="form-label">Fecha Inicio</label>
            <input type="date" class="form-control" [(ngModel)]="nuevaSocia.fechaInicio" name="fechaInicio" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha Baja</label>
            <input type="date" class="form-control" [(ngModel)]="nuevaSocia.fechaBaja" name="fechaBaja" />
          </div>
        </div>
      </div>

      <!-- Descripciones y otros -->
      <div class="card mb-4">
        <div class="card-header fw-bold">Descripción y Otros</div>
        <div class="card-body row g-3">
          <div class="col-md-12">
            <label class="form-label">Observaciones</label>
            <textarea class="form-control" [(ngModel)]="nuevaSocia.observaciones" name="observaciones" rows="3"></textarea>
          </div>
        </div>
      </div>

      <!-- Botón -->
      <div class="text-end mt-4">
        <button type="submit" class="btn btn-success">
          <i class="bi bi-check-circle"></i>
          {{ nuevaSocia.id ? 'Actualizar' : 'Agregar Socia' }}
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Estilos externos -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" />
