<form [formGroup]="form" (ngSubmit)="onSubmit()" class="row g-3 px-3 py-2">
  <div class="col-md-6">
    <label class="form-label">Número de Socia</label>
    <input type="text" formControlName="numeroSocia" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Nombre</label>
    <input type="text" formControlName="nombre" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Apellidos</label>
    <input type="text" formControlName="apellidos" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Nombre del Negocio</label>
    <input type="text" formControlName="nombreNegocio" class="form-control" />
  </div>

  <div class="col-12">
    <label class="form-label">Descripción del Negocio</label>
    <textarea formControlName="descripcionNegocio" class="form-control" rows="2"></textarea>
  </div>

  <div class="col-md-6">
    <label class="form-label">Dirección</label>
    <input type="text" formControlName="direccion" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Teléfono Personal</label>
    <input type="text" formControlName="telefonoPersonal" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Teléfono Negocio</label>
    <input type="text" formControlName="telefonoNegocio" class="form-control" />
  </div>

  <div class="col-md-6">
    <label class="form-label">Email</label>
    <input type="email" formControlName="email" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">CIF</label>
    <input type="text" formControlName="cif" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Número de Cuenta</label>
    <input type="text" formControlName="numeroCuenta" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Epígrafe</label>
    <input type="text" formControlName="epigrafe" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Fecha de Inicio</label>
    <input type="date" formControlName="fechaInicio" class="form-control" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Fecha de Baja</label>
    <input type="date" formControlName="fechaBaja" class="form-control" />
  </div>

  <div class="col-md-4 d-flex align-items-center">
    <div class="form-check mt-4">
      <input class="form-check-input" type="checkbox" formControlName="activa" id="activaCheck" />
      <label class="form-check-label" for="activaCheck">
        Activa
      </label>
    </div>
  </div>

  <div class="col-12">
    <label class="form-label">Observaciones</label>
    <textarea formControlName="observaciones" class="form-control" rows="2"></textarea>
  </div>

  <div class="col-md-6">
    <label class="form-label">Categoría</label>
    <select formControlName="categoriaId" class="form-select">
      <option [ngValue]="null">Seleccione una categoría</option>
      <option *ngFor="let categoria of categorias" [value]="categoria.id">
        {{ categoria.nombre }}
      </option>
    </select>
  </div>

  <div class="col-12 d-flex justify-content-end">
    <button type="submit" class="btn btn-primary me-2" [disabled]="form.invalid">Guardar</button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
  </div>
</form>
